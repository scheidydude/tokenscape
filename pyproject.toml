[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "claude-token-burn"
version = "0.1.0"
description = "Claude Code token usage CLI and TUI"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
    "textual>=0.61",
    "rich>=13",
]

[project.scripts]
claude-token-burn = "token_burn.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/token_burn"]

[tool.ruff]
src = ["src"]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
